<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Conectar WhatsApp</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            color: #17212b;
        }

        main {
            width: min(90%, 440px);
            padding: 32px;
            text-align: center;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, .08);
        }

        #qrImage {
            width: 320px;
            max-width: 100%;
            height: auto;
            margin: 16px auto;
        }

        nav {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-top: 24px;
        }

        a { color: #087f5b; }
    </style>
    <script src="/script.js" defer></script>
</head>
<body>
    <main data-page="qr">
        <h1>Conectar WhatsApp</h1>
        <p id="qrMessage">Buscando un código QR...</p>
        <img id="qrImage" alt="Código QR de WhatsApp" hidden>
        <nav>
            <a href="/userdata">Datos del usuario</a>
            <a href="/status">Estado del gateway</a>
        </nav>
    </main>
</body>
</html>
