<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Datos del usuario</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            color: #17212b;
        }

        main {
            width: min(90%, 480px);
            padding: 32px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, .08);
        }

        label {
            display: block;
            margin-top: 16px;
            font-weight: 600;
        }

        input {
            box-sizing: border-box;
            width: 100%;
            margin-top: 6px;
            padding: 10px 12px;
            border: 1px solid #ced4da;
            border-radius: 8px;
        }

        button {
            width: 100%;
            margin-top: 22px;
            padding: 12px;
            border: 0;
            border-radius: 8px;
            background: #087f5b;
            color: white;
            cursor: pointer;
        }

        button:disabled { opacity: .65; }
        .secondary { background: #1864ab; }
        .danger { background: #c92a2a; }
        dt { margin-top: 14px; font-weight: 600; }
        dd { margin: 4px 0 0; }
        .error { color: #c92a2a; }
        a { color: #087f5b; }
    </style>
    <script src="/script.js" defer></script>
</head>
<body>
    <main data-page="userdata">
        <h1>Datos del usuario</h1>
        <p id="userMessage">Consultando la información registrada...</p>

        <section id="registeredUser" hidden>
            <dl>
                <dt>Nombre completo</dt>
                <dd id="savedFullName"></dd>
                <dt>Teléfono</dt>
                <dd id="savedPhone"></dd>
                <dt>Correo electrónico</dt>
                <dd id="savedEmail"></dd>
                <dt>Telefono de soporte</dt>
                <dd id="savedSupportPhone"></dd>
                <dt>Telefono para Airbnb</dt>
                <dd id="savedSecondAribnbPhone"></dd>
            </dl>

            <button id="editUserButton" class="secondary" type="button">Modificar informacion</button>
            <button id="clearUserButton" class="danger" type="button">Limpiar información</button>
        </section>

        <form id="userForm" hidden>
            <label for="fullName">Nombre completo</label>
            <input id="fullName" name="fullName" autocomplete="name" required>

            <label for="phone">Teléfono</label>
            <input id="phone" name="phone" type="tel" autocomplete="tel" required>

            <label for="email">Correo electrónico</label>
            <input id="email" name="email" type="email" autocomplete="email" required>

            <label for="supportPhone">Telefono de soporte (opcional)</label>
            <input id="supportPhone" name="supportPhone" type="tel" autocomplete="tel">

            <label for="secondAribnbPhone">Telefono para Airbnb (opcional)</label>
            <input id="secondAribnbPhone" name="secondAribnbPhone" type="tel" autocomplete="tel">

            <button id="saveUserButton" type="submit">Guardar</button>
        </form>

        <p><a href="/whatsapp/qr">Volver al código QR</a></p>
        <p><a href="/app-status">Volver al estatus</a></p>
    </main>
</body>
</html>
